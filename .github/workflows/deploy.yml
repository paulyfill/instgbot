name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script_stop: true
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          
          cd ${{ secrets.VPS_PROJECT_PATH }}
          
          # Pull latest changes (ignore sqlite WAL temp files)
          git checkout -- bot_data.sqlite-shm bot_data.sqlite-wal 2>/dev/null || true
          git pull origin main
          
          # Install dependencies
          ~/.bun/bin/bun install
          
          # Reload with zero downtime
          ~/.bun/bin/pm2 reload ecosystem.config.cjs --update-env || ~/.bun/bin/pm2 start ecosystem.config.cjs
          
          ~/.bun/bin/pm2 save
